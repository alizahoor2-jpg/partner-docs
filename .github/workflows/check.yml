name: Partner Docs Check

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 12:00 PM PKT (07:00 UTC)
  workflow_dispatch:  # Manual trigger
  repository_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run check
        run: |
          cd ${{ github.workspace }}
          python3 360dialog_docs_check.py
        shell: bash
      
      - name: Send email notification
        if: success()
        env:
          GMAIL: ${{ secrets.GMAIL_ADDR }}
          APP_PASS: ${{ secrets.APP_PASS }}
          SEND_TO: ${{ secrets.SEND_TO }}
        run: |
          python3 -c "
import smtplib
import os
from email.mime.multipart import MIMEMultipart
from email.mime.text import MIMEText

gmail = os.environ.get('GMAIL', '')
app_pass = os.environ.get('APP_PASS', '')
send_to = os.environ.get('SEND_TO', '')

if gmail and app_pass and send_to:
    msg = MIMEMultipart()
    msg['From'] = gmail
    msg['To'] = send_to
    msg['Subject'] = '📊 360dialog Partner Docs - Daily Check Complete'
    body = '''360dialog Partner Docs Check
================================

Status: Completed successfully

The daily check has finished. 
Check GitHub Actions log for details.

---
Automated from GitHub Actions
'''
    msg.attach(MIMEText(body, 'plain'))
    
    server = smtplib.SMTP('smtp.gmail.com', 587)
    server.starttls()
    server.login(gmail, app_pass)
    server.sendmail(gmail, send_to, msg.as_string())
    server.quit()
    print('Email sent')
"